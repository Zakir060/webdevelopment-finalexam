<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .qutu{
            width: 800px;
            display: grid;
            height: 100px;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            line-height: 100px;
            text-align: center;
        }
        .box{
            background-color: red;
            color: white;
            
        }
        .headd{
            grid-column: span 2;

        }
    </style>
</head>
<body>
    <div class="qutu">
        <div class="headd box">Header</div>
        <div class="box">box 3</div>
        <div class="box">box 4</div>
    </div>
</body>
</html>
