<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .box{
    border:2px solid green;
    padding: 10px;
    border-radius: 3px;
    padding: 10px;
    display: inline-block;

    margin: 0px;
}
    label{
        font-weight: bold;
    }
    button{
    background-color: green;
    color: white;
    border: none;
    border-radius: 2px;
    }
    input, select{
    margin: 10px;
    }
    </style>
</head>
<body>
<div class="box">
<label>Name:</label><br>
<input type="text" placeholder="Enter your name">
<br>
<label>Email:</label>
<br>    
<input type="email" placeholder="Enter Adress">
<br>
<label>City:</label>
<br>
<select>
    <option>New York</option>
</select>
<br><br>
<button>Submit</button>
</div>
</body>
</html>
