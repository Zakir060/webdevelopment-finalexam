<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            border: 4px solid pink;
            width: 300px;
            height: 400px;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        h1{
            color: pink;
                        margin: 5px;

        }
        label{
            color: pink;
                        margin: 5px;

        }
        input{
            width: 250px;
            height: 40px;
            border: 6px solid pink;
            margin: 5px;
        }
        button{
            background-color: pink;
            color: white;
            width: 250px;
            height: 70px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Feedback Form</h1>
        <label>Name:</label>
        <input type="text" placeholder="Enter your name">
        <label>Phone:</label>
        <input type="number" placeholder="Phone Number">
        <label>Company</label>
        <input type="text" placeholder="Company name">
        <button>Submit Feedback</button>
    </div>
</body>
</html>
