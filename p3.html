<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            display: flex;
            gap: 10px;
        }
        .qutu{
            width: 200px;
            height: 60px;
            text-align: center;
            line-height: 60px;
            border-radius: 5px;
            color: white;
        }
        .fi{
            background-color: red;
        }
        .se{
            background-color: blue;
        }
        .th{
            background-color: green;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="qutu fi">First</div>
        <div class="qutu se">Second</div>
        <div class="qutu th">Third</div>
    </div>
</body>
</html>
