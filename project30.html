<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .body{
            margin: 30px;
        }
        .box{
            width: 300px;
            height: 400px;
            border:4px  solid orangered;
            padding: 15px;
        }
        h1{
        text-align:center;
         color:orange;   
        }
        input{
            width: 280px;
            height: 30px;
            border: 3px solid orangered;
            margin: 10px;
        }
        select{
        margin:10px;
        border:3px solid orange;
        width: 280px;
        height: 30px;
        }
        button{
            width: 280px;
            height: 42px;
            background-color: orange;
            border: none;
            color: white;
            line-height: 42px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Registration</h1>
        <br>
        <input type="text" placeholder="First name">
        <br>
        <input type="text" placeholder="Last name">
        <br>
        <input type="number" placeholder="Phone number">
        <br>
        <select>
        <option>Select country</option>
        </select>
        <br>
        <button>Register Now</button>
    </div>
</body>
</html>
