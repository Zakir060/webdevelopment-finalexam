<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    .container{
    display: flex;
    gap: 10px;
    }
    .red{
        background-color: red;
    }
    .blue{
        background-color: blue;
    }
    .green{
        background-color: green;
    }
    .box{
    width: 300px;
    height: 100px;
    border-radius: 10px;
    color: white;
    text-align:center;
    line-height: 100px;
}
</style>
</head>
<body>
    <div class="container">
<div class="box red">First</div>
<div class="box blue">Second</div>
<div class="box green">Third</div>
    </div>
</body>
</html>
