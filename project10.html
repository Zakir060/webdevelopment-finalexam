<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 300px;
            height: 220px;
            background-color: blue;
            padding:10px;
            border-radius:10px;
        }
        label{
            color:white;
        }
        input{
            width:270px;
            height: 30px;
            border-radius: 5px;
            border:none;
        }
        button{
            width: 300px;
            height: 40px;
            background-color:orange;
            color:white;
            width: 100%;
            border:none;
            border-radius:5px;
        }
    </style>
</head>
<body>
<div class="box">
    <label>Full Name:</label>
    <br>
    <input type="text" placeholder="Your name and Surname">
    <br>
    <label>Email:</label>
    <br>
    <input type="email" placeholder="email@example.com">
    <br>
    <label>Message:</label>
    <br>
    <input type="text" placeholder="Write your message...">
    <br>
    <button>submit</button>
</div>
</body>
</html>
