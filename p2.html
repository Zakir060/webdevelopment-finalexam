<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 400px;
            height: 350px;
            border-radius: 5px;
            border:4px solid green;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }
        label{
            margin: 10px;
            font-weight: bold;
        }
        input{
            width: 350px;
            height: 50px;
            margin: 10px; 
            border-radius: 5px;
        }
        select{
            width: 350px;
            height: 50px;
            margin: 10px;
        }
        button{
            border-radius: 5px;
            background-color: green;
            color: white;
            width: 100px;
            height: 20px;
        }
    </style>
</head>
<body>
    <div class="box">
        <label>Name:</label>
        <input type="text" placeholder="Enter your name">
        <label>Email:</label>
        <input type="text" placeholder="Email address">
        <label>City:</label>
        <select>
            <option>New York</option>
        </select> 
        <button>Submit</button>
    </div>
</body>
</html>
