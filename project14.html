<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            text-align:center
        }
        .box{
            width: 400px;
            border-radius: 5px;
            gap:10px
        }
        input{
            width: 400px;
            height: 40px;
            border: 2px solid blue;
            border-radius: 5px;
        }
        button{
            width: 400px;
            height: 40px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="box">
    <h1>Login</h1>    
    <input type="text" placeholder="Your Email address">
    <br>
    <input type="text" placeholder="Password">
    <br>
    <input type="text" placeholder="Confirm password">
    <br>
    <button>Login</button>
    </div>
    
</body>
</html>
