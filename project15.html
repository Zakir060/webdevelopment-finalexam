<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .qutu{
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            width: 400px;
        }
        .box{
            height: 90px;
            border-radius: 5px;
            color: white;
            text-align: center;
            line-height: 90px; /*setirin yerlesdiyi hundurluk*/
        }
        .a{
            background-color: red;
            grid-row: span 2;
            height:187px;
        }   
        .b, .c , .e{
            background-color: blue;
        }
        .d{
            background-color: green;
            grid-column: span 2;        

        }
        .e{
            grid-column:span 2;
        }
    </style>
</head>
<body>
    <div class="qutu">
        <div class="box a">A</div>
        <div class="box b">B</div>
        <div class="box c">C</div>
        <div class="box d">D</div>
        <div class="box e">E</div>
    </div>
</body>
</html>
