<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: flex;
            flex-direction:column;
            width: 400px;
            gap: 20px;
        }
        .box{
            border-radius: 5px;
            display: flex;
            height: 80px;
            color: white;
            align-items: center;
        }
        .box1{
            background-color: blue;
        }
        .box2{
            background-color: red;
        }
        .box3{
            background-color: green;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box box1">Element1</div>
        <div class="box box2">Element2</div>
        <div class="box box3">Element3</div>
    </div>
</body>
</html>
